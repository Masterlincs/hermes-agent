<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column;
  }
  #header {
    padding: 12px 20px; background: #16213e; border-bottom: 1px solid #0f3460;
    display: flex; align-items: center; gap: 12px;
  }
  #header h1 { font-size: 16px; font-weight: 600; color: #e94560; }
  #header .status { font-size: 12px; color: #888; margin-left: auto; }
  #header .status.connected { color: #4ecca3; }
  #messages {
    flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px;
  }
  .message {
    max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px;
    white-space: pre-wrap; word-wrap: break-word;
  }
  .message.user { align-self: flex-end; background: #0f3460; border-bottom-right-radius: 4px; }
  .message.assistant { align-self: flex-start; background: #16213e; border-bottom-left-radius: 4px; }
  .message.tool_call { align-self: center; background: #1a1a2e; border: 1px solid #333; font-size: 12px; color: #aaa; max-width: 90%; }
  .message.tool_result { align-self: center; background: #111; border: 1px solid #333; font-size: 12px; color: #999; max-width: 90%; }
  .message.error { align-self: center; background: #3d0000; border: 1px solid #700; color: #ff6666; }
  .thinking { align-self: center; color: #888; font-size: 13px; font-style: italic; }
  #input-area {
    padding: 16px 20px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 12px;
  }
  #input { flex: 1; padding: 10px 14px; border: 1px solid #333; border-radius: 8px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
  #input:focus { border-color: #e94560; }
  #send { padding: 10px 24px; border: none; border-radius: 8px; background: #e94560; color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
  #send:hover:not(:disabled) { background: #d63851; }
  .typing { align-self: center; color: #888; font-size: 13px; }
  .typing::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
  code { background: #2a2a4e; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  pre { background: #2a2a4e; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 13px; }
  .model-bar {
    display: flex; gap: 8px; padding: 8px 20px; background: #16213e; border-top: 1px solid #0f3460;
    align-items: center; font-size: 12px; color: #888;
  }
  .model-bar input { background: #1a1a2e; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; color: #e0e0e0; font-size: 12px; }
  .model-bar label { white-space: nowrap; }
</style>
</head>
<body>
  <div id="header">
    <h1>Hermes</h1>
    <span class="status" id="status">disconnected</span>
    <button onclick="newSession()" style="background:#333;color:#fff;border:none;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:12px">New Session</button>
  </div>
  <div id="messages"></div>
  <div class="model-bar">
    <label>Model:</label>
    <input type="text" id="model" value="" placeholder="(default)" style="width:160px">
    <label>Provider:</label>
    <input type="text" id="provider" value="" placeholder="(default)" style="width:120px">
  </div>
  <div id="input-area">
    <input type="text" id="input" placeholder="Message Hermes..." autocomplete="off" autofocus>
    <button id="send" onclick="sendMessage()">Send</button>
  </div>

<script>
let sessionId = '';
let isRunning = false;

function addMessage(role, content) {
  const el = document.createElement('div');
  el.className = 'message ' + role;
  el.textContent = content;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
  return el;
}

function addThinking() {
  const el = document.createElement('div');
  el.className = 'thinking';
  el.textContent = 'Thinking...';
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
  return el;
}

function setStatus(text, connected) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status' + (connected ? ' connected' : '');
}

async function newSession() {
  try {
    const res = await fetch('/api/chat/session/new', { method: 'POST' });
    const data = await res.json();
    sessionId = data.session_id;
    document.getElementById('messages').innerHTML = '';
    setStatus('connected', true);
    addMessage('assistant', 'New session started. How can I help?');
  } catch (e) {
    setStatus('connection error', false);
  }
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isRunning) return;

  if (!sessionId) {
    try {
      const res = await fetch('/api/chat/session/new', { method: 'POST' });
      const data = await res.json();
      sessionId = data.session_id;
      setStatus('connected', true);
    } catch (e) {
      setStatus('connection error', false);
      return;
    }
  }

  input.value = '';
  isRunning = true;
  document.getElementById('send').disabled = true;

  addMessage('user', text);
  const thinking = addThinking();

  const model = document.getElementById('model').value;
  const provider = document.getElementById('provider').value;

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId, model, provider }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      let eventType = '';
      let eventData = '';

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          eventData = line.slice(6);
        } else if (line === '' && eventType) {
          // Empty line = event delimiter
          handleEvent(eventType, eventData);
          eventType = '';
          eventData = '';
        }
      }
    }
  } catch (e) {
    thinking.remove();
    addMessage('error', 'Connection error: ' + e.message);
  }

  thinking.remove();
  isRunning = false;
  document.getElementById('send').disabled = false;
  input.focus();
}

function handleEvent(type, data) {
  try {
    const parsed = JSON.parse(data);
    switch (type) {
      case 'token':
        addMessage('assistant', parsed.text || '');
        break;
      case 'tool_call':
        addMessage('tool_call', '🔧 ' + (parsed.name || '') + '(' + JSON.stringify(parsed.args || {}) + ')');
        break;
      case 'tool_result':
        addMessage('tool_result', '📄 Result: ' + (parsed.result || '').slice(0, 200));
        break;
      case 'error':
        addMessage('error', '⚠️ ' + (parsed.message || 'Unknown error'));
        break;
      case 'done':
        // Session complete
        break;
    }
  } catch (e) {
    // ignore parse errors
  }
}

// Auto-create session on first interaction
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-new-session on page load
newSession();
</script>
</body>
</html>
